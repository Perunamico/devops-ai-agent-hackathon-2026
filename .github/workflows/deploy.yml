name: Deploy

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write
  pull-requests: write

env:
  REGION: asia-northeast1
  ARTIFACT_REPOSITORY: ai-pet
  IMAGE_NAME: api
  GEMINI_MODEL: gemini-2.5-flash
  USE_VERTEX_AI: "true"
  SKIP_AUTH: "false"
  FIRESTORE_ENABLED: "true"
  FIRESTORE_DATABASE: "(default)"

jobs:
  frontend:
    name: Frontend lint and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}

  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      SKIP_AUTH: "true"
      FIRESTORE_ENABLED: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest -q

  deploy-branch:
    name: Deploy branch environment
    runs-on: ubuntu-latest
    needs:
      - frontend
      - backend
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve deploy target
        shell: bash
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          PROD_FIREBASE_HOSTING_SITE: ${{ vars.PROD_FIREBASE_HOSTING_SITE }}
          DEV_FIREBASE_HOSTING_SITE: ${{ vars.DEV_FIREBASE_HOSTING_SITE }}
          PROD_CLOUD_RUN_SERVICE: ${{ vars.PROD_CLOUD_RUN_SERVICE }}
          DEV_CLOUD_RUN_SERVICE: ${{ vars.DEV_CLOUD_RUN_SERVICE }}
          PROD_APP_BASE_URL: ${{ vars.PROD_APP_BASE_URL }}
          DEV_APP_BASE_URL: ${{ vars.DEV_APP_BASE_URL }}
          CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT: ${{ vars.CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT }}
        run: |
          set -euo pipefail

          if [[ -z "${PROJECT_ID}" ]]; then
            echo "GCP_PROJECT_ID secret is required." >&2
            exit 1
          fi

          if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            DEPLOY_ENV="production"
            FIREBASE_HOSTING_SITE="${PROD_FIREBASE_HOSTING_SITE:-${PROJECT_ID}}"
            CLOUD_RUN_SERVICE="${PROD_CLOUD_RUN_SERVICE:-ai-pet-api}"
            APP_BASE_URL="${PROD_APP_BASE_URL:-https://${FIREBASE_HOSTING_SITE}.web.app}"
          else
            DEPLOY_ENV="development"
            FIREBASE_HOSTING_SITE="${DEV_FIREBASE_HOSTING_SITE:-${PROJECT_ID}-dev}"
            CLOUD_RUN_SERVICE="${DEV_CLOUD_RUN_SERVICE:-ai-pet-api-dev}"
            APP_BASE_URL="${DEV_APP_BASE_URL:-https://${FIREBASE_HOSTING_SITE}.web.app}"
          fi

          RUNTIME_SERVICE_ACCOUNT="${CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT:-ai-pet-api-runner@${PROJECT_ID}.iam.gserviceaccount.com}"
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${ARTIFACT_REPOSITORY}/${IMAGE_NAME}:${GITHUB_SHA}"

          {
            echo "PROJECT_ID=${PROJECT_ID}"
            echo "DEPLOY_ENV=${DEPLOY_ENV}"
            echo "FIREBASE_HOSTING_SITE=${FIREBASE_HOSTING_SITE}"
            echo "CLOUD_RUN_SERVICE=${CLOUD_RUN_SERVICE}"
            echo "RUNTIME_SERVICE_ACCOUNT=${RUNTIME_SERVICE_ACCOUNT}"
            echo "APP_BASE_URL=${APP_BASE_URL}"
            echo "IMAGE=${IMAGE}"
          } >> "${GITHUB_ENV}"

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build and push Docker image
        run: |
          gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet
          docker build -t "$IMAGE" ./backend
          docker push "$IMAGE"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "$CLOUD_RUN_SERVICE" \
            --project "$PROJECT_ID" \
            --image "$IMAGE" \
            --region "$REGION" \
            --service-account "$RUNTIME_SERVICE_ACCOUNT" \
            --set-secrets "GEMINI_API_KEY=gemini-api-key:latest" \
            --set-env-vars "USE_VERTEX_AI=$USE_VERTEX_AI,GOOGLE_CLOUD_PROJECT=$PROJECT_ID,FIRESTORE_DATABASE=$FIRESTORE_DATABASE,VERTEX_AI_LOCATION=$REGION,GEMINI_MODEL=$GEMINI_MODEL,SKIP_AUTH=$SKIP_AUTH,FIRESTORE_ENABLED=$FIRESTORE_ENABLED,APP_BASE_URL=$APP_BASE_URL" \
            --allow-unauthenticated

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}

      - name: Generate Firebase Hosting config
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const config = {
            hosting: {
              site: process.env.FIREBASE_HOSTING_SITE,
              public: 'frontend/out',
              ignore: ['firebase.json', '**/.*', '**/node_modules/**'],
              rewrites: [
                {
                  source: '/api/**',
                  run: {
                    serviceId: process.env.CLOUD_RUN_SERVICE,
                    region: process.env.REGION,
                  },
                },
                {
                  source: '**',
                  destination: '/index.html',
                },
              ],
            },
          };

          fs.writeFileSync('firebase.ci.json', `${JSON.stringify(config, null, 2)}\n`);
          NODE

      - name: Deploy to Firebase Hosting
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}
          GOOGLE_CLOUD_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          npm install -g firebase-tools@15.22.1
          firebase deploy \
            --project "$PROJECT_ID" \
            --config firebase.ci.json \
            --only hosting \
            --non-interactive

      - name: Check deployed backend health
        run: |
          SERVICE_URL="$(gcloud run services describe "$CLOUD_RUN_SERVICE" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --format 'value(status.url)')"
          curl --fail --silent --show-error "$SERVICE_URL/health"

  deploy-preview:
    name: Deploy PR preview
    runs-on: ubuntu-latest
    needs:
      - frontend
      - backend
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve preview target
        shell: bash
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          PREVIEW_FIREBASE_HOSTING_SITE: ${{ vars.PREVIEW_FIREBASE_HOSTING_SITE }}
          CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT: ${{ vars.CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT }}
        run: |
          set -euo pipefail

          if [[ -z "${PROJECT_ID}" ]]; then
            echo "GCP_PROJECT_ID secret is required." >&2
            exit 1
          fi

          FIREBASE_HOSTING_SITE="${PREVIEW_FIREBASE_HOSTING_SITE:-${PROJECT_ID}-dev}"
          CLOUD_RUN_SERVICE="ai-pet-api-pr-${{ github.event.pull_request.number }}"
          CHANNEL_ID="pr-${{ github.event.pull_request.number }}"
          APP_BASE_URL="https://${FIREBASE_HOSTING_SITE}--${CHANNEL_ID}.web.app"
          RUNTIME_SERVICE_ACCOUNT="${CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT:-ai-pet-api-runner@${PROJECT_ID}.iam.gserviceaccount.com}"
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${ARTIFACT_REPOSITORY}/${IMAGE_NAME}:pr-${{ github.event.pull_request.number }}-${GITHUB_SHA}"

          {
            echo "PROJECT_ID=${PROJECT_ID}"
            echo "FIREBASE_HOSTING_SITE=${FIREBASE_HOSTING_SITE}"
            echo "CLOUD_RUN_SERVICE=${CLOUD_RUN_SERVICE}"
            echo "CHANNEL_ID=${CHANNEL_ID}"
            echo "RUNTIME_SERVICE_ACCOUNT=${RUNTIME_SERVICE_ACCOUNT}"
            echo "APP_BASE_URL=${APP_BASE_URL}"
            echo "IMAGE=${IMAGE}"
          } >> "${GITHUB_ENV}"

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build and push Docker image
        run: |
          gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet
          docker build -t "$IMAGE" ./backend
          docker push "$IMAGE"

      - name: Deploy backend to Cloud Run
        run: |
          gcloud run deploy "$CLOUD_RUN_SERVICE" \
            --project "$PROJECT_ID" \
            --image "$IMAGE" \
            --region "$REGION" \
            --service-account "$RUNTIME_SERVICE_ACCOUNT" \
            --set-secrets "GEMINI_API_KEY=gemini-api-key:latest" \
            --set-env-vars "USE_VERTEX_AI=$USE_VERTEX_AI,GOOGLE_CLOUD_PROJECT=$PROJECT_ID,FIRESTORE_DATABASE=$FIRESTORE_DATABASE,VERTEX_AI_LOCATION=$REGION,GEMINI_MODEL=$GEMINI_MODEL,SKIP_AUTH=$SKIP_AUTH,FIRESTORE_ENABLED=$FIRESTORE_ENABLED,APP_BASE_URL=$APP_BASE_URL" \
            --allow-unauthenticated

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}

      - name: Generate Firebase Hosting config
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const config = {
            hosting: {
              site: process.env.FIREBASE_HOSTING_SITE,
              public: 'frontend/out',
              ignore: ['firebase.json', '**/.*', '**/node_modules/**'],
              rewrites: [
                {
                  source: '/api/**',
                  run: {
                    serviceId: process.env.CLOUD_RUN_SERVICE,
                    region: process.env.REGION,
                  },
                },
                {
                  source: '**',
                  destination: '/index.html',
                },
              ],
            },
          };

          fs.writeFileSync('firebase.ci.json', `${JSON.stringify(config, null, 2)}\n`);
          NODE

      - name: Deploy frontend to Firebase Preview Channel
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}
          GOOGLE_CLOUD_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          npm install -g firebase-tools@15.22.1
          firebase hosting:channel:deploy "$CHANNEL_ID" \
            --project "$PROJECT_ID" \
            --config firebase.ci.json \
            --expires 7d \
            --non-interactive
